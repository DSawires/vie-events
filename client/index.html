<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book an Appointment - VIE Communities</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../logo.png" alt="VIE Communities" class="logo">
      <h1>Book an Appointment</h1>
      <p>Select a date and time that works for you</p>
    </header>

    <!-- Booking Form -->
    <div id="booking-form">
      <!-- Agent Info -->
      <div class="card">
        <div class="agent-info">
          <div class="agent-avatar" id="agent-initials">JD</div>
          <div class="agent-details">
            <h3 id="agent-name">Jane Doe</h3>
            <p id="agent-title">Community Specialist</p>
          </div>
        </div>
      </div>

      <!-- Calendar -->
      <div class="card">
        <h2>Select a Date</h2>
        <div class="calendar-header">
          <span id="current-month">March 2026</span>
          <div class="calendar-nav">
            <button id="prev-month">&larr;</button>
            <button id="next-month">&rarr;</button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid">
          <!-- Days will be generated by JS -->
        </div>
      </div>

      <!-- Time Slots -->
      <div class="card" id="time-card">
        <h2>Select a Time</h2>
        <p id="selected-date-label" style="color: var(--color-gray); margin-bottom: 16px;">Choose a date first</p>
        <div class="time-slots" id="time-slots">
          <!-- Time slots will be generated by JS -->
        </div>
      </div>

      <!-- Client Details -->
      <div class="card hidden" id="details-card">
        <h2>Your Details</h2>
        <form id="client-form">
          <div class="form-group">
            <label for="client-name">Full Name</label>
            <input type="text" id="client-name" name="name" required placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="client-email">Email</label>
            <input type="email" id="client-email" name="email" required placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="client-phone">Phone Number</label>
            <input type="tel" id="client-phone" name="phone" placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label for="client-notes">Notes (Optional)</label>
            <textarea id="client-notes" name="notes" rows="3" placeholder="Anything you'd like us to know..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Confirm Booking</button>
        </form>
      </div>
    </div>

    <!-- Confirmation -->
    <div class="card hidden" id="confirmation">
      <div class="success-message">
        <div class="success-icon">&#10003;</div>
        <h2>Booking Confirmed!</h2>
        <p id="confirmation-details">Your appointment has been scheduled.</p>
        <p style="margin-top: 20px; color: var(--color-gray);">A confirmation email has been sent to your inbox.</p>
      </div>
    </div>
  </div>

  <script>
    // State
    let currentDate = new Date();
    let selectedDate = null;
    let selectedTime = null;

    // Get agent info from URL params (for MVP, using defaults)
    const urlParams = new URLSearchParams(window.location.search);
    const agentName = urlParams.get('agent') || 'Jane Doe';
    const agentTitle = urlParams.get('title') || 'Community Specialist';

    // Set agent info
    document.getElementById('agent-name').textContent = agentName;
    document.getElementById('agent-title').textContent = agentTitle;
    document.getElementById('agent-initials').textContent = agentName.split(' ').map(n => n[0]).join('');

    // Calendar functions
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      // Day headers
      dayNames.forEach(day => {
        const header = document.createElement('div');
        header.className = 'calendar-day-header';
        header.textContent = day;
        grid.appendChild(header);
      });

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // Previous month days
      for (let i = 0; i < firstDay.getDay(); i++) {
        const prevDate = new Date(year, month, -firstDay.getDay() + i + 1);
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = prevDate.getDate();
        grid.appendChild(day);
      }

      // Current month days
      for (let i = 1; i <= lastDay.getDate(); i++) {
        const date = new Date(year, month, i);
        const day = document.createElement('div');
        day.className = 'calendar-day';
        day.textContent = i;

        if (date < today) {
          day.classList.add('disabled');
        } else {
          if (date.getTime() === today.getTime()) {
            day.classList.add('today');
          }
          if (selectedDate && date.toDateString() === selectedDate.toDateString()) {
            day.classList.add('selected');
          }
          day.addEventListener('click', () => selectDate(date));
        }

        grid.appendChild(day);
      }

      // Next month days
      const remainingDays = 42 - grid.children.length;
      for (let i = 1; i <= remainingDays; i++) {
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = i;
        grid.appendChild(day);
      }

      document.getElementById('current-month').textContent = `${monthNames[month]} ${year}`;
    }

    function selectDate(date) {
      selectedDate = date;
      selectedTime = null;
      renderCalendar();
      renderTimeSlots();
      document.getElementById('details-card').classList.add('hidden');
    }

    function renderTimeSlots() {
      const container = document.getElementById('time-slots');
      const label = document.getElementById('selected-date-label');

      if (!selectedDate) {
        label.textContent = 'Choose a date first';
        container.innerHTML = '';
        return;
      }

      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      label.textContent = selectedDate.toLocaleDateString('en-US', options);

      // Generate time slots (9 AM to 5 PM)
      const slots = [];
      for (let hour = 9; hour < 17; hour++) {
        slots.push(`${hour > 12 ? hour - 12 : hour}:00 ${hour >= 12 ? 'PM' : 'AM'}`);
        slots.push(`${hour > 12 ? hour - 12 : hour}:30 ${hour >= 12 ? 'PM' : 'AM'}`);
      }

      // Randomly mark some as unavailable for demo
      const unavailable = new Set([2, 5, 8, 11]);

      container.innerHTML = slots.map((slot, i) => `
        <div class="time-slot ${unavailable.has(i) ? 'unavailable' : ''} ${selectedTime === slot ? 'selected' : ''}"
             data-time="${slot}" ${unavailable.has(i) ? '' : `onclick="selectTime('${slot}')"`}>
          ${slot}
        </div>
      `).join('');
    }

    function selectTime(time) {
      selectedTime = time;
      renderTimeSlots();
      document.getElementById('details-card').classList.remove('hidden');
      document.getElementById('details-card').scrollIntoView({ behavior: 'smooth' });
    }

    // Navigation
    document.getElementById('prev-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Form submission
    document.getElementById('client-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const booking = {
        agent: agentName,
        date: selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }),
        time: selectedTime,
        client: {
          name: formData.get('name'),
          email: formData.get('email'),
          phone: formData.get('phone'),
          notes: formData.get('notes')
        }
      };

      // Store booking (MVP - localStorage)
      const bookings = JSON.parse(localStorage.getItem('vie-bookings') || '[]');
      bookings.push({ ...booking, id: Date.now(), createdAt: new Date().toISOString() });
      localStorage.setItem('vie-bookings', JSON.stringify(bookings));

      // Show confirmation
      document.getElementById('booking-form').classList.add('hidden');
      document.getElementById('confirmation').classList.remove('hidden');
      document.getElementById('confirmation-details').textContent =
        `${booking.date} at ${booking.time} with ${agentName}`;
    });

    // Initialize
    renderCalendar();
  </script>
</body>
</html>
