<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request an Appointment | VIE Communities</title>
  <meta name="description" content="Schedule an appointment with VIE Communities. Leave your info and we'll reach out to find a time that works for you.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Request an Appointment | VIE Communities">
  <meta property="og:description" content="Schedule an appointment with VIE Communities. Leave your info and we'll reach out to find a time that works for you.">
  <meta property="og:image" content="logo.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Request an Appointment | VIE Communities">
  <meta name="twitter:description" content="Schedule an appointment with VIE Communities. Leave your info and we'll reach out to find a time that works for you.">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "VIE Communities",
    "description": "Schedule an appointment with VIE Communities.",
    "logo": "logo.png",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Appointments"
    }
  }
  </script>

  <style>
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-card {
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }

    .form-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .form-header .logo {
      max-width: 140px;
      margin-bottom: 20px;
    }

    .form-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 8px;
    }

    .form-header p {
      color: var(--color-gray);
      font-size: 0.95rem;
    }

    .form-group input {
      text-align: center;
    }

    .form-group input::placeholder {
      text-align: center;
    }

    .submit-btn {
      margin-top: 4px;
    }

    .success-state {
      text-align: center;
      padding: 32px 20px;
    }

    .success-state .checkmark {
      width: 64px;
      height: 64px;
      background: var(--color-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-state .checkmark svg {
      width: 32px;
      height: 32px;
      stroke: white;
      stroke-width: 3;
    }

    .success-state h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .success-state p {
      color: var(--color-gray);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="page-wrapper">
    <div class="form-card card" id="formCard">
      <div class="form-header">
        <img src="logo.png" alt="VIE Communities" class="logo">
        <h1>Let's Connect</h1>
        <p>Leave your info and we'll reach out to schedule a time.</p>
      </div>

      <form id="appointmentForm" action="https://formspree.io/f/mwvwkdyp" method="POST" aria-label="Appointment request form">
        <div class="form-group">
          <input type="text" id="name" name="name" required placeholder="Your Name" aria-label="Your name" autocomplete="name">
        </div>

        <div class="form-group">
          <input type="tel" id="phone" name="phone" required placeholder="Phone Number" aria-label="Phone number" autocomplete="tel">
        </div>

        <button type="submit" class="btn btn-primary btn-full submit-btn">Request Appointment</button>
      </form>
    </div>

    <div class="form-card card hidden" id="successCard" role="status" aria-live="polite">
      <div class="success-state">
        <div class="checkmark">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>We'll Be in Touch!</h2>
        <p>Expect a call from us shortly to find a time that works for you.</p>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('appointmentForm');
    const formCard = document.getElementById('formCard');
    const successCard = document.getElementById('successCard');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          formCard.classList.add('hidden');
          successCard.classList.remove('hidden');
        } else {
          throw new Error('Form submission failed');
        }
      } catch (error) {
        submitBtn.textContent = 'Request Appointment';
        submitBtn.disabled = false;
        alert('There was an error. Please try again.');
      }
    });
  </script>
</body>
</html>
